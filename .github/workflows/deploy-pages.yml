name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codycross-answers
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: codycross-answers/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Refresh daily snapshot
        run: npm run update:daily

      - name: Build static site
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: codycross-answers/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Enable GitHub Pages
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.createPagesSite({
                owner: context.repo.owner,
                repo: context.repo.repo,
                build_type: 'workflow'
              });
              core.info('GitHub Pages enabled');
            } catch (error) {
              if (error.status === 409 || error.status === 422) {
                core.info('GitHub Pages already enabled');
              } else {
                throw error;
              }
            }
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
