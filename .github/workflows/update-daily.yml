name: Update Daily Data

on:
  schedule:
    - cron: '31 18 * * *'
  workflow_dispatch:

jobs:
  update-daily:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codycross-answers
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: codycross-answers/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Update daily snapshot
        run: npm run update:daily

      - name: Commit snapshot if changed
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add data/daily.json
          git diff --cached --quiet || git commit -m "update daily snapshot"
          git push
