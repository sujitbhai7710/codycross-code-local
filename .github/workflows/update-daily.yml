name: Update Daily Data

on:
  schedule:
    - cron: '31 18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-daily:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codycross-answers
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: codycross-answers/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Update daily snapshot
        run: npm run update:daily

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily.json
          if git diff --cached --quiet; then
            echo "No daily snapshot changes to commit."
          else
            git commit -m "update daily snapshot"
            git push
          fi

      - name: Build static site
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: codycross-answers/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
